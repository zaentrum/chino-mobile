# XcodeGen descriptor. Run `xcodegen` (https://github.com/yonaskolb/XcodeGen)
# from the iosApp/ directory to materialize iosApp.xcodeproj. The generated
# project is .gitignored — regenerate locally whenever you change targets,
# schemes, or build settings.
#
# Two configurations (Beta / Prod) feed the shared MainViewController via
# Info.plist keys, which themselves come from Configuration/<env>.xcconfig.

name: iosApp
options:
  bundleIdPrefix: io.github.zaentrum.chino
  deploymentTarget:
    iOS: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    OTHER_LDFLAGS: "$(inherited) -framework shared"
    FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
  configs:
    Beta: Configuration/Beta.xcconfig
    Prod: Configuration/Prod.xcconfig

configs:
  Beta: debug
  Prod: release

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        excludes:
          - "Info.plist"
    resources:
      - iosApp/Assets.xcassets
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: "$(APP_DISPLAY_NAME)"
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        ChinoFlavor: "$(CHINO_FLAVOR)"
        ChinoApiBaseUrl: "$(CHINO_API_BASE_URL)"
        ChinoOidcIssuer: "$(CHINO_OIDC_ISSUER)"
        ChinoOidcClientId: "$(CHINO_OIDC_CLIENT_ID)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(CHINO_BUNDLE_ID)"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    preBuildScripts:
      - name: "Build shared framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
